# Mappings Configuration
#
# This file maps each requirement (from all_requirements.txt) to resume content.
# When a requirement appears in requirements.txt, the system looks it up here and:
# 1. Collects any 'summary' text to include in the SUMMARY section
# 2. Marks items with 'skill: true' to include in the SKILLS section
# 3. Uses 'position' to select job title variants (via roles.yaml)
# 4. Uses 'education' for education-related content
# 5. Uses other custom fields as needed
#
# Layout:
# requirement_name:
#   summary: "Text to appear in SUMMARY section (if this requirement is matched)"
#   skill: true                    # Mark as a skill to include in SKILLS section
#   position: true                 # Mark as a position/role title
#   education: "Education text"    # Education-related content
#   either_or: "group_name"        # Group mutually-exclusive requirements
#   other_field: "value"           # Any other fields for custom use
#
# Rules:
# - If a requirement has 'skill: true', it appears in SKILLS (case-sensitive)
# - If a requirement has 'summary:', that text appears in SUMMARY section
# - If a requirement has 'position: true', it's treated as a role/position title
# - If a requirement has 'education:', it appears in EDUCATION section
# - If a requirement has 'either_or: "group"', it's part of a mutually-exclusive group
#   When multiple items in the same either_or group are in requirements.yaml,
#   only the one with highest importance is included (others are filtered out)
# - A requirement can have multiple fields (e.g., both summary and skill)
# - Field names are case-sensitive
#
# Example:
#   JavaScript:
#     skill: true
#     summary: "5 years experience using JavaScript"
#
# This means:
# - "JavaScript" appears in SKILLS section
# - "5 years experience using JavaScript" appears in SUMMARY section

